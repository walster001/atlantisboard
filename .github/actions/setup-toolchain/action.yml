name: Setup Node 24 and Bun
description: Install Node.js 24 and Bun (matches FORCE_JAVASCRIPT_ACTIONS_TO_NODE24).
inputs:
  bun-version:
    description: Bun version to install
    required: false
    default: "1.3.5"
  registry-url:
    description: Optional npm registry URL for setup-node (OIDC publish)
    required: false
    default: ""
runs:
  using: composite
  steps:
    - uses: actions/setup-node@v5
      with:
        node-version: "24"
        registry-url: ${{ inputs.registry-url }}
    - uses: oven-sh/setup-bun@v2.2.0
      with:
        bun-version: ${{ inputs.bun-version }}
