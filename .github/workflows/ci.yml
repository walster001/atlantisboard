name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck:ci

  test:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:8.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      MONGODB_URI: mongodb://localhost:27017/kanboard?replicaSet=rs0
      MONGODB_TEST_URI: mongodb://localhost:27017/kanboard?replicaSet=rs0
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      REDIS_URL: redis://localhost:6379
      SESSION_SECRET: ci-test-session-secret-minimum-32-characters
      JWT_SECRET: ci-test-jwt-secret-minimum-32-characters-long
      CSRF_SECRET: ci-test-csrf-secret-minimum-32-characters
      ENCRYPTION_KEY: ci-test-encryption-key-minimum-32-chars
      MEDIA_SIGN_SECRET: ci-test-media-sign-secret-min-32-chars
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Init MongoDB replica set
        run: |
          for i in $(seq 1 30); do
            if docker run --rm --network host mongo:8.0 mongosh "mongodb://localhost:27017" --eval "db.adminCommand('ping')" --quiet 2>/dev/null; then
              break
            fi
            sleep 2
          done
          docker run --rm --network host mongo:8.0 mongosh "mongodb://localhost:27017" --eval "
            try {
              const status = rs.status();
              if (status.ok === 1) { quit(0); }
            } catch (e) { /* not initiated */ }
            rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'localhost:27017' }] });
          "

      - name: Run tests
        run: bun test

  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Dependency audit (fail on high+)
        run: bun audit --audit-level=high
