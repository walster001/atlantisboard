name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (semver, e.g. 1.0.0). Defaults to package.json."
        required: false
        type: string
      npm_dist_tag:
        description: "npm dist-tag"
        required: false
        default: "latest"
        type: string
      confirm:
        description: "I have added a ## [version] section to CHANGELOG.md for this release"
        required: true
        type: boolean
      recover_release:
        description: "Recovery mode: skip npm publish if this version is already on npm (e.g. GitHub Release failed after publish)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write # npm trusted publishing (OIDC)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  gate:
    if: inputs.confirm != true
    runs-on: ubuntu-latest
    steps:
      - name: Require release confirmation
        run: |
          echo "::error::Production release aborted. Check 'confirm' after adding a ## [version] section to CHANGELOG.md."
          exit 1

  verify:
    if: inputs.confirm == true
    uses: ./.github/workflows/reusable-verify.yml
    secrets: inherit

  release:
    needs: verify
    if: inputs.confirm == true
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@11.5.1

      - name: Resolve version
        id: ver
        run: |
          V="${{ inputs.version }}"
          if [[ -z "$V" ]]; then
            V="$(bun -e 'console.log((await Bun.file("package.json").json()).version)')"
          fi
          if [[ ! "$V" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid semver: $V"
            exit 1
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=v${V}" >> "$GITHUB_OUTPUT"

      - name: Validate CHANGELOG section
        run: ./scripts/changelog-extract.sh "${{ steps.ver.outputs.version }}" > /tmp/release-notes.md

      - name: Check npm registry
        id: npm
        run: |
          STATE="$(./scripts/release-check-npm-version.sh "${{ steps.ver.outputs.version }}")"
          echo "state=$STATE" >> "$GITHUB_OUTPUT"
          if [[ "$STATE" == "published" ]]; then
            if [[ "${{ inputs.recover_release }}" != "true" ]]; then
              echo "::error::atlantisboard@${{ steps.ver.outputs.version }} is already on npm. Bump the version, or re-run with recover_release enabled to finish GitHub Release only."
              exit 1
            fi
            echo "::warning::Version already on npm; npm publish will be skipped (recover_release)."
          fi

      - name: Sync release version to package.json
        run: ./scripts/sync-release-version.sh "${{ steps.ver.outputs.version }}"

      - run: bun install --frozen-lockfile

      - name: Build npm package and release zip
        run: |
          ./scripts/build-npm-package.sh
          ./scripts/release-bundle.sh --no-checks

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="${{ steps.ver.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists; skipping tag push"
          else
            git tag -a "$TAG" -m "Release ${{ steps.ver.outputs.version }}"
            git push origin "$TAG"
          fi

      - name: Publish to npm
        if: steps.npm.outputs.state != 'published'
        working-directory: packages/atlantisboard
        run: npm publish --access public --tag "${{ inputs.npm_dist_tag }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          ZIP="release/atlantisboard-${{ steps.ver.outputs.version }}.zip"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ZIP" --clobber
          else
            gh release create "$TAG" "$ZIP" \
              --title "Release ${{ steps.ver.outputs.version }}" \
              --notes-file /tmp/release-notes.md
          fi
          if [[ -f packages/atlantisboard/atlantisboard-*.tgz ]]; then
            gh release upload "$TAG" packages/atlantisboard/atlantisboard-*.tgz --clobber || true
          fi
