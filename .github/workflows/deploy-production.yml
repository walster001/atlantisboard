name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (semver, e.g. 1.0.0). Defaults to package.json."
        required: false
        type: string
      npm_dist_tag:
        description: "npm dist-tag"
        required: false
        default: "latest"
        type: string
      confirm:
        description: "I have added a ## [version] section to CHANGELOG.md for this release"
        required: true
        type: boolean

permissions:
  contents: write
  id-token: write # npm trusted publishing (OIDC)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  gate:
    if: inputs.confirm != true
    runs-on: ubuntu-latest
    steps:
      - name: Require release confirmation
        run: |
          echo "::error::Production release aborted. Check 'confirm' after adding a ## [version] section to CHANGELOG.md."
          exit 1

  verify:
    if: inputs.confirm == true
    uses: ./.github/workflows/reusable-verify.yml
    secrets: inherit

  release:
    needs: verify
    if: inputs.confirm == true
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@11.5.1

      - name: Resolve version
        id: ver
        run: |
          V="${{ inputs.version }}"
          if [[ -z "$V" ]]; then
            V="$(bun -e 'console.log((await Bun.file("package.json").json()).version)')"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=v${V}" >> "$GITHUB_OUTPUT"

      - name: Validate CHANGELOG section
        run: ./scripts/changelog-extract.sh "${{ steps.ver.outputs.version }}" > /tmp/release-notes.md

      - run: bun install --frozen-lockfile

      - name: Build npm package and release zip
        run: |
          ./scripts/build-npm-package.sh
          ./scripts/release-bundle.sh --no-checks

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "${{ steps.ver.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.ver.outputs.tag }} already exists"
          else
            git tag -a "${{ steps.ver.outputs.tag }}" -m "Release ${{ steps.ver.outputs.version }}"
            git push origin "${{ steps.ver.outputs.tag }}"
          fi

      # Authenticates via npm trusted publisher (OIDC). Do not set NODE_AUTH_TOKEN here.
      - name: Publish to npm
        working-directory: packages/atlantisboard
        run: npm publish --access public --tag "${{ inputs.npm_dist_tag }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          ZIP="release/atlantisboard-${{ steps.ver.outputs.version }}.zip"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ZIP" --clobber
          else
            gh release create "$TAG" "$ZIP" \
              --title "Release ${{ steps.ver.outputs.version }}" \
              --notes-file /tmp/release-notes.md
          fi
          if [[ -f packages/atlantisboard/atlantisboard-*.tgz ]]; then
            gh release upload "$TAG" packages/atlantisboard/atlantisboard-*.tgz --clobber || true
          fi
