# Shared lint, typecheck, test (MongoDB + Redis), and audit jobs.
# Call with `secrets: inherit` — see .github/SECRETS.md for required repository secrets.
name: Reusable verify

on:
  workflow_call:

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck:ci

  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      MONGODB_URI: mongodb://localhost:27017/kanboard?replicaSet=rs0
      MONGODB_TEST_URI: mongodb://localhost:27017/kanboard?replicaSet=rs0
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      REDIS_URL: redis://localhost:6379
      SESSION_SECRET: ${{ secrets.CI_SESSION_SECRET }}
      JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}
      CSRF_SECRET: ${{ secrets.CI_CSRF_SECRET }}
      ENCRYPTION_KEY: ${{ secrets.CI_ENCRYPTION_KEY }}
      MEDIA_SIGN_SECRET: ${{ secrets.CI_MEDIA_SIGN_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - name: Start MongoDB replica set
        run: |
          # Service containers cannot pass mongod --replSet; start explicitly (see docker-compose.yml).
          docker run -d --name ci-mongodb -p 27017:27017 mongo:8.0 \
            mongod --replSet rs0 --bind_ip_all
          for i in $(seq 1 30); do
            if docker exec ci-mongodb mongosh --quiet --eval "db.adminCommand('ping').ok" 2>/dev/null | grep -q 1; then
              break
            fi
            sleep 2
          done
          docker exec ci-mongodb mongosh --quiet --eval "
            try {
              const status = rs.status();
              if (status.ok === 1) { quit(0); }
            } catch (e) { /* not initiated */ }
            rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'localhost:27017' }] });
          "
          for i in $(seq 1 30); do
            state=$(docker exec ci-mongodb mongosh --quiet --eval \
              "try { rs.status().members[0].stateStr } catch (e) { 'STARTUP' }" 2>/dev/null || echo STARTUP)
            if [ "$state" = "PRIMARY" ]; then
              break
            fi
            sleep 2
          done
      - run: bun test

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - run: bun audit --audit-level=high
