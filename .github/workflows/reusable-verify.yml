# Shared lint, typecheck, test (MongoDB + Redis), and audit jobs.
# Call with `secrets: inherit` — see .github/SECRETS.md for required repository secrets.
name: Reusable verify

on:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: ShellCheck installer scripts
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          files=(packages/atlantisboard/install/**/*.sh)
          shellcheck -x -e SC1090,SC1091 \
            packages/atlantisboard/install/setup.sh \
            "${files[@]}"
      - uses: ./.github/actions/setup-toolchain
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck:ci

  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      LOG_LEVEL: warn
      MONGODB_URI: mongodb://127.0.0.1:27017/kanboard?replicaSet=rs0
      MONGODB_TEST_URI: mongodb://127.0.0.1:27017/kanboard?replicaSet=rs0
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      REDIS_URL: redis://localhost:6379
      SESSION_SECRET: ${{ secrets.CI_SESSION_SECRET }}
      JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}
      CSRF_SECRET: ${{ secrets.CI_CSRF_SECRET }}
      ENCRYPTION_KEY: ${{ secrets.CI_ENCRYPTION_KEY }}
      MEDIA_SIGN_SECRET: ${{ secrets.CI_MEDIA_SIGN_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-toolchain
      - run: bun install --frozen-lockfile
      - name: Validate CI secrets
        run: |
          set -euo pipefail
          missing=0
          for name in SESSION_SECRET JWT_SECRET CSRF_SECRET ENCRYPTION_KEY MEDIA_SIGN_SECRET; do
            eval "val=\$$name"
            if [ -z "${val:-}" ] || [ "${#val}" -lt 32 ]; then
              echo "::error title=Missing CI secret::Configure repository secret CI_${name} (≥32 chars). See .github/SECRETS.md"
              missing=1
            fi
          done
          if [ "$JWT_SECRET" = "$MEDIA_SIGN_SECRET" ]; then
            echo "::error title=Invalid CI secrets::CI_MEDIA_SIGN_SECRET must differ from CI_JWT_SECRET"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
      - name: Start MongoDB replica set
        run: |
          set -euo pipefail
          # Service containers cannot pass mongod --replSet; start explicitly (see docker-compose.yml).
          docker rm -f ci-mongodb 2>/dev/null || true
          docker run -d --name ci-mongodb -p 27017:27017 mongo:8.0.4 \
            mongod --replSet rs0 --bind_ip_all
          for i in $(seq 1 30); do
            if docker exec ci-mongodb mongosh --quiet --eval "db.adminCommand('ping').ok" 2>/dev/null | grep -q 1; then
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "MongoDB did not become reachable" >&2
              exit 1
            fi
            sleep 2
          done
          docker exec ci-mongodb mongosh --quiet --eval "
            try {
              const status = rs.status();
              if (status.ok === 1) { quit(0); }
            } catch (e) { /* not initiated */ }
            rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: '127.0.0.1:27017' }] });
          "
          for i in $(seq 1 30); do
            state=$(docker exec ci-mongodb mongosh --quiet --eval \
              "try { rs.status().members[0].stateStr } catch (e) { 'STARTUP' }" 2>/dev/null || echo STARTUP)
            if [ "$state" = "PRIMARY" ]; then
              echo "MongoDB replica set PRIMARY ready"
              exit 0
            fi
            sleep 2
          done
          echo "MongoDB replica set did not reach PRIMARY" >&2
          docker logs ci-mongodb --tail 50 >&2 || true
          exit 1
      - name: Run tests
        # Serial file execution: suites share one MongoDB and mongoose connection.
        run: bun test --timeout 120000 --max-concurrency 1

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-toolchain
      - run: bun install --frozen-lockfile
      - run: bun audit --audit-level=high

  docker-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-toolchain
      - run: bun install --frozen-lockfile
      - name: Prepare atlantisboard package for Docker
        run: ./scripts/prepare-atlantisboard-package.sh
      - name: Build Docker images (development + production)
        run: bash .github/scripts/verify-docker-images.sh
