name: Staging

# Build release zip after CI succeeds on main (avoids duplicate verify with ci.yml).
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: ["main", "master"]

permissions:
  contents: read

concurrency:
  group: staging-${{ github.event.workflow_run.head_branch }}-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

jobs:
  build-artifact:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - name: Build release zip
        run: ./scripts/release-bundle.sh --no-checks
      - name: Upload staging artifact
        uses: actions/upload-artifact@v4
        with:
          name: atlantisboard-staging-${{ github.event.workflow_run.head_sha }}
          path: release/atlantisboard-*.zip
          retention-days: 30
