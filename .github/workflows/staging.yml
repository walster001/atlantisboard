name: Staging

# Build installer + runtime zips on demand (Actions → Staging → Run workflow). Run after CI is green on the target ref.
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: staging-${{ github.ref }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  build-artifact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - name: Build npm package tree and release zips
        run: |
          ./scripts/build-npm-package.sh
          ./scripts/release-installer-zip.sh
          ./scripts/release-bundle.sh --no-checks --skip-build
      - name: Upload staging artifacts
        uses: actions/upload-artifact@v4
        with:
          name: atlantisboard-staging-${{ github.sha }}
          path: |
            release/atlantisboard-*.zip
          retention-days: 30
