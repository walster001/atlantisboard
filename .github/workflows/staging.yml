name: Staging

# Build installer + runtime on demand (Actions → Staging → Run workflow). Run after CI is green on the target ref.
# Artifacts are flat directory trees (atlantisboard-setup, install/, dist/, … at extract root) — not nested .zip files.
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: staging-${{ github.ref }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  build-artifact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-toolchain
      - name: Build npm package tree and release zips
        run: |
          ./scripts/build-npm-package.sh
          ./scripts/release-installer-zip.sh
          ./scripts/release-bundle.sh --no-checks --skip-build
          ./scripts/stage-release-artifact-trees.sh
      - name: Resolve release version
        id: ver
        run: echo "version=$(bun -e 'console.log((await Bun.file("package.json").json()).version)')" >> "$GITHUB_OUTPUT"
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: atlantisboard-${{ steps.ver.outputs.version }}-installer
          path: release/staging-installer/
          retention-days: 30
          if-no-files-found: error
      - name: Upload runtime artifact
        uses: actions/upload-artifact@v4
        with:
          name: atlantisboard-${{ steps.ver.outputs.version }}-runtime
          path: release/staging-runtime/
          retention-days: 30
          if-no-files-found: error
