# Preprocesses docs/wiki/ Markdown into pages/wiki/ for the Jekyll site,
# then triggers the Jekyll Pages build/deploy.
name: Build & Deploy Wiki

on:
  push:
    branches: ["main", "master"]
    paths:
      - "docs/wiki/**"
      - ".github/scripts/build-wiki.sh"
      - ".github/workflows/wiki-build.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preprocess wiki pages
        run: bash .github/scripts/build-wiki.sh

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./pages
          destination: ./_site
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
