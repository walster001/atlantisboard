# Kanboard production reverse proxy (nginx)
# Place on the host that terminates TLS and forwards to the app container.
# App container listens on kanboard-app:3000 on the Docker network.

upstream kanboard_app {
    server kanboard-app:3000;
    keepalive 32;
}

# Rate limit zones (edge layer — app also rate-limits /api/v1/auth/*)
limit_req_zone $binary_remote_addr zone=kanboard_auth:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=kanboard_api:10m rate=30r/s;

# Redirect apex/marketing host to app (adjust per deployment)
server {
    listen 80;
    listen [::]:80;
    server_name atlantis.social www.atlantis.social;
    return 301 https://app.atlantis.social$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name app.atlantis.social;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.atlantis.social;

    # TLS certificates (Let's Encrypt / certbot paths shown as example)
    ssl_certificate     /etc/letsencrypt/live/app.atlantis.social/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.atlantis.social/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # HSTS (31536000 = 1 year)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Upload limit: CARD_ATTACHMENT_MAX_MB + margin (default 50 MB + 5 MB)
    client_max_body_size 55m;

    # Admin API — restrict to office/VPN CIDRs (adjust)
    location ^~ /api/v1/admin/ {
        allow 10.0.0.0/8;
        allow 192.168.0.0/16;
        deny all;

        limit_req zone=kanboard_api burst=20 nodelay;

        proxy_pass http://kanboard_app;
        include /etc/nginx/snippets/kanboard-proxy.conf;
    }

  # Auth endpoints — stricter edge rate limit
    location ^~ /api/v1/auth/ {
        limit_req zone=kanboard_auth burst=20 nodelay;

        proxy_pass http://kanboard_app;
        include /etc/nginx/snippets/kanboard-proxy.conf;
    }

    # Attachment byte streaming — higher burst; disable buffering for range responses
    location ^~ /api/v1/attachments/ {
        limit_req zone=kanboard_api burst=120 nodelay;

        proxy_pass http://kanboard_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
    }

    # Socket.io WebSocket upgrade
    location /socket.io/ {
        proxy_pass http://kanboard_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location / {
        limit_req zone=kanboard_api burst=60 nodelay;

        proxy_pass http://kanboard_app;
        include /etc/nginx/snippets/kanboard-proxy.conf;
    }
}
