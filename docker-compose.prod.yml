# Production full-stack Compose (repo root). For installer-based deploys, use
# packages/atlantisboard/install/docker/docker-compose.fullstack.yml instead.
#
# Malware scanning: clamd when MemAvailable ≥ 2GB, else on-demand clamscan (see entrypoint.sh).
# Signatures live in clamav-sigs-prod; first upload or container start may run freshclam.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "3"

services:
  mongodb:
    image: mongo:8.0.4
    container_name: kanboard-mongodb-prod
    logging: *default-logging
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: kanboard
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_ROOT_USER:?Set MONGODB_ROOT_USER in .env}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_ROOT_PASSWORD:?Set MONGODB_ROOT_PASSWORD in .env}
      MONGODB_APP_USER: ${MONGODB_APP_USER:-kanboard_app}
      MONGODB_APP_PASSWORD: ${MONGODB_APP_PASSWORD:?Set MONGODB_APP_PASSWORD in .env}
    command:
      [
        'mongod',
        '--replSet',
        'rs0',
        '--bind_ip_all',
      ]
    volumes:
      - mongo-data-prod:/data/db
      - mongo-config-prod:/data/configdb
      - ./docker/mongodb/init-app-user.js:/docker-entrypoint-initdb.d/init-app-user.js:ro
    networks:
      - kanboard-network-prod
    healthcheck:
      test: >
        sh -c "
        mongosh \"mongodb://$${MONGO_INITDB_ROOT_USERNAME}:$${MONGO_INITDB_ROOT_PASSWORD}@localhost:27017/admin\" --quiet --eval \"db.adminCommand('ping')\"
        "
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mongodb-init:
    image: mongo:8.0.4
    container_name: kanboard-mongodb-init-prod
    depends_on:
      mongodb:
        condition: service_healthy
    restart: 'no'
    environment:
      MONGODB_ROOT_USER: ${MONGODB_ROOT_USER}
      MONGODB_ROOT_PASSWORD: ${MONGODB_ROOT_PASSWORD}
      MONGODB_HOST: mongodb
      MONGODB_REPLICA_MEMBER_HOST: mongodb:27017
    volumes:
      - ./docker/mongodb/replica-init.sh:/replica-init.sh:ro
    entrypoint: ['bash', '/replica-init.sh']
    networks:
      - kanboard-network-prod

  redis:
    image: redis:7-alpine
    container_name: kanboard-redis-prod
    logging: *default-logging
    restart: unless-stopped
    command: >
      sh -c "
      if [ -n \"$${REDIS_PASSWORD}\" ]; then
        redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\"
      else
        echo 'REDIS_PASSWORD is required in production Compose' >&2;
        exit 1;
      fi
      "
    volumes:
      - redis-data-prod:/data
    networks:
      - kanboard-network-prod
    healthcheck:
      test: >
        sh -c "
        redis-cli -a \"$${REDIS_PASSWORD}\" ping
        "
      interval: 10s
      timeout: 5s
      retries: 5

  # AGPL community S3 — not AIStor enterprise
  minio:
    image: docker.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: kanboard-minio-prod
    logging: *default-logging
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_ACCESS_KEY:-${MINIO_ACCESS_KEY:?Set MINIO_ACCESS_KEY in .env}}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_SECRET_KEY:-${MINIO_SECRET_KEY:?Set MINIO_SECRET_KEY in .env}}
    command: server /data --console-address "127.0.0.1:9001"
    volumes:
      - minio-data-prod:/data
    networks:
      - kanboard-network-prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # AGPL community mc CLI — not AIStor enterprise
  minio-setup:
    image: docker.io/minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: kanboard-minio-setup-prod
    depends_on:
      - minio
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_ROOT_ACCESS_KEY: ${MINIO_ROOT_ACCESS_KEY:-}
      MINIO_ROOT_SECRET_KEY: ${MINIO_ROOT_SECRET_KEY:-}
    volumes:
      - ./docker/minio/prod-setup.sh:/setup.sh:ro
      - ./docker/minio/app-readwrite-policy.json:/policy/app-readwrite-policy.json:ro
    entrypoint: ['/bin/sh', '/setup.sh']
    networks:
      - kanboard-network-prod

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: kanboard-app-prod
    logging: *default-logging
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      HOST: ${HOST:-0.0.0.0}
      MONGODB_URI: ${MONGODB_URI:?Set MONGODB_URI with credentials and replicaSet= in .env}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
      REDIS_TLS: ${REDIS_TLS:-false}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      MEDIA_SIGN_SECRET: ${MEDIA_SIGN_SECRET:?Set MEDIA_SIGN_SECRET in .env}
      BACKUP_MC_PATH: ${BACKUP_MC_PATH:-/usr/local/bin/mc}
      BACKUP_MC_MIRROR_ALIAS: ${BACKUP_MC_MIRROR_ALIAS:-local}
      BACKUP_MC_ENDPOINT: ${BACKUP_MC_ENDPOINT:-http://minio:9000}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      SESSION_SECRET: ${SESSION_SECRET}
      CSRF_SECRET: ${CSRF_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      TRUST_PROXY_HOPS: ${TRUST_PROXY_HOPS:-1}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      APP_URL: ${APP_URL:-http://localhost:3000}
      POMPELMI_SKIP_SCAN: ${POMPELMI_SKIP_SCAN:-false}
      CLAMAV_DB_DIR: /var/lib/clamav
      POMPELMI_FAIL_OPEN: ${POMPELMI_FAIL_OPEN:-false}
    volumes:
      - clamav-sigs-prod:/var/lib/clamav
    depends_on:
      mongodb:
        condition: service_healthy
      mongodb-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    networks:
      - kanboard-network-prod
    healthcheck:
      test: ["CMD", "bun", "run", "-e", "fetch('http://localhost:3000/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mongo-data-prod:
  mongo-config-prod:
  redis-data-prod:
  minio-data-prod:
  clamav-sigs-prod:

networks:
  kanboard-network-prod:
    driver: bridge
