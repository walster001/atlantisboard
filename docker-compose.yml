# Local development: MongoDB, Redis, MinIO
#
# PERSISTENCE POLICY (read docs/DOCKER-DEV-DATA.md):
# - Data is stored on the HOST under .docker-data/ (bind mounts), not only inside Docker volumes.
# - SAFE:    docker compose stop | docker compose down        (no -v flag)
# - UNSAFE:  docker compose down -v | docker volume prune | rm -rf .docker-data
#
# Override storage root: KANBOARD_DOCKER_DATA_DIR in .env (absolute path recommended outside repo)

services:
  mongodb:
    image: mongo:8.0
    container_name: kanboard-mongodb
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_DATABASE: kanboard
    command:
      [
        'mongod',
        '--replSet',
        'rs0',
        '--bind_ip_all',
      ]
    volumes:
      - type: bind
        source: ${KANBOARD_DOCKER_DATA_DIR:-./.docker-data}/mongodb/db
        target: /data/db
        bind:
          create_host_path: true
      - type: bind
        source: ${KANBOARD_DOCKER_DATA_DIR:-./.docker-data}/mongodb/configdb
        target: /data/configdb
        bind:
          create_host_path: true
    networks:
      - kanboard-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/kanboard --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mongodb-init:
    image: mongo:8.0
    container_name: kanboard-mongodb-init
    depends_on:
      mongodb:
        condition: service_healthy
    restart: 'no'
    environment:
      MONGODB_HOST: mongodb
      MONGODB_REPLICA_MEMBER_HOST: mongodb:27017
    volumes:
      - ./docker/mongodb/replica-init.sh:/replica-init.sh:ro
    entrypoint: ['bash', '/replica-init.sh']
    networks:
      - kanboard-network

  redis:
    image: redis:7-alpine
    container_name: kanboard-redis
    ports:
      - '6379:6379'
    command: >
      sh -c "
      if [ -n \"$${REDIS_PASSWORD}\" ]; then
        redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\"
      else
        redis-server --appendonly yes
      fi
      "
    volumes:
      - type: bind
        source: ${KANBOARD_DOCKER_DATA_DIR:-./.docker-data}/redis
        target: /data
        bind:
          create_host_path: true
    networks:
      - kanboard-network
    healthcheck:
      test: >
        sh -c "
        if [ -n \"$${REDIS_PASSWORD}\" ]; then
          redis-cli -a \"$${REDIS_PASSWORD}\" ping
        else
          redis-cli ping
        fi
        "
      interval: 10s
      timeout: 5s
      retries: 5

  # AGPL community S3 — not AIStor enterprise
  minio:
    image: docker.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: kanboard-minio
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - type: bind
        source: ${KANBOARD_DOCKER_DATA_DIR:-./.docker-data}/minio
        target: /data
        bind:
          create_host_path: true
    networks:
      - kanboard-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3

  # AGPL community mc CLI — not AIStor enterprise
  minio-setup:
    image: docker.io/minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: kanboard-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - ./docker/minio/prod-setup.sh:/setup.sh:ro
    entrypoint: ['/bin/sh', '/setup.sh']
    networks:
      - kanboard-network

networks:
  kanboard-network:
    driver: bridge
