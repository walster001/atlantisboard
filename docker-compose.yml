# Dev stack (~2.75 GiB steady-state for mongodb+redis+minio) + Bun caps in scripts/dev.ts (~2.5 GiB concurrent).
# Total intended dev footprint ≤ ~6 GiB including Docker overhead (see scripts/dev-start.sh).
services:
  mongodb:
    image: mongo:8.0
    container_name: kanboard-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: kanboard
    command:
      [
        'mongod',
        '--replSet',
        'rs0',
        '--bind_ip_all',
        '--wiredTigerCacheSizeGB',
        '0.75',
      ]
    volumes:
      - mongo-data:/data/db
      - mongo-config:/data/configdb
    networks:
      - kanboard-network
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G

  mongodb-init:
    image: mongo:8.0
    container_name: kanboard-mongodb-init
    depends_on:
      mongodb:
        condition: service_healthy
    restart: 'no'
    networks:
      - kanboard-network
    command: >
      bash -lc "
        mongosh --host mongodb:27017 --quiet --eval '
          try {
            const status = rs.status();
            if (status && status.ok === 1) {
              const conf = rs.conf();
              const currentHost = conf?.members?.[0]?.host;
              if (currentHost === \"localhost:27017\") {
                print(\"rs already initialized\");
                quit(0);
              }
              // Reconfigure to a host-accessible address so clients connecting via localhost can discover the primary.
              conf.members[0].host = \"localhost:27017\";
              rs.reconfig(conf, { force: true });
              print(\"rs reconfigured to localhost:27017\");
              quit(0);
            }
          } catch (e) {}
          rs.initiate({
            _id: \"rs0\",
            members: [{ _id: 0, host: \"localhost:27017\" }]
          });
          print(\"rs initiated\");
        '
      "
    deploy:
      resources:
        limits:
          memory: 384M

  redis:
    image: redis:7-alpine
    container_name: kanboard-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: >
      sh -c "
      if [ -n \"$${REDIS_PASSWORD}\" ]; then
        redis-server --appendonly yes --maxmemory 200mb --maxmemory-policy allkeys-lru --requirepass \"$${REDIS_PASSWORD}\"
      else
        redis-server --appendonly yes --maxmemory 200mb --maxmemory-policy allkeys-lru
      fi
      "
    volumes:
      - redis-data:/data
    networks:
      - kanboard-network
    healthcheck:
      test: >
        sh -c "
        if [ -n \"$${REDIS_PASSWORD}\" ]; then
          redis-cli -a \"$${REDIS_PASSWORD}\" ping
        else
          redis-cli ping
        fi
        "
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  minio:
    image: minio/minio:latest
    container_name: kanboard-minio
    restart: unless-stopped
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - kanboard-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

  minio-setup:
    image: minio/mc:latest
    container_name: kanboard-minio-setup
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
      mc mb myminio/import-inline --ignore-existing;
      mc mb myminio/card-attachments --ignore-existing;
      mc mb myminio/branding --ignore-existing;
      mc mb myminio/fonts --ignore-existing;
      mc anonymous set public myminio/branding;
      exit 0;
      "
    networks:
      - kanboard-network
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  mongo-data:
  mongo-config:
  redis-data:
  minio-data:

networks:
  kanboard-network:
    driver: bridge
