# Dependency stack for atlantisboard-setup (Docker mode). Run the app via systemd on the host.
#
# VOLUME RESET (reinstall / new secrets):
#   cd install/docker && docker compose --env-file ../../.env -f docker-compose.deps.yml down -v
# Or run: install/docker/reset-docker-data.sh deps
# Named volumes (mongo-data, redis-data, minio-data) keep old passwords after reinstall unless removed.
services:
  mongodb:
    image: mongo:8.0
    container_name: atlantisboard-mongodb-deps
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${MONGODB_DB_NAME:-kanboard}
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_ROOT_USER:?Set MONGODB_ROOT_USER in .env}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_ROOT_PASSWORD:?Set MONGODB_ROOT_PASSWORD in .env}
      MONGODB_APP_USER: ${MONGODB_APP_USER:-kanboard_app}
      MONGODB_APP_PASSWORD: ${MONGODB_APP_PASSWORD:?Set MONGODB_APP_PASSWORD in .env}
    entrypoint: ['/mongodb/docker-entrypoint-with-keyfile.sh']
    command: ['mongod', '--replSet', 'rs0', '--bind_ip_all', '--keyFile', '/data/replica.key']
    volumes:
      - mongo-data:/data/db
      - mongo-config:/data/configdb
      - ./mongodb/init-app-user.js:/docker-entrypoint-initdb.d/init-app-user.js:ro
      - ./mongodb/docker-entrypoint-with-keyfile.sh:/mongodb/docker-entrypoint-with-keyfile.sh:ro
    ports:
      - '127.0.0.1:27017:27017'
    healthcheck:
      test: >
        sh -c "mongosh --host 127.0.0.1 --port 27017
        -u \"$${MONGO_INITDB_ROOT_USERNAME}\" -p \"$${MONGO_INITDB_ROOT_PASSWORD}\"
        --authenticationDatabase admin --quiet
        --eval 'db.adminCommand({ ping: 1 }).ok'"
      interval: 10s
      timeout: 10s
      retries: 8
      start_period: 60s

  mongodb-init:
    image: mongo:8.0
    container_name: atlantisboard-mongodb-init-deps
    depends_on:
      mongodb:
        condition: service_healthy
    restart: 'no'
    environment:
      MONGODB_ROOT_USER: ${MONGODB_ROOT_USER}
      MONGODB_ROOT_PASSWORD: ${MONGODB_ROOT_PASSWORD}
      MONGODB_HOST: mongodb
      # Host app uses localhost:27017; member must match published bind address.
      MONGODB_REPLICA_MEMBER_HOST: 127.0.0.1:27017
    volumes:
      - ./mongodb/replica-init-auth.sh:/replica-init.sh:ro
    entrypoint: ['bash', '/replica-init.sh']

  redis:
    image: redis:7-alpine
    container_name: atlantisboard-redis-deps
    restart: unless-stopped
    command: >
      sh -c "
      if [ -n \"$${REDIS_PASSWORD}\" ]; then
        redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\"
      else
        echo 'REDIS_PASSWORD is required' >&2;
        exit 1;
      fi
      "
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    volumes:
      - redis-data:/data
    ports:
      - '127.0.0.1:6379:6379'
    healthcheck:
      test: >
        sh -c "redis-cli -a \"$${REDIS_PASSWORD}\" ping"
      interval: 10s
      timeout: 5s
      retries: 5

  # AGPL community S3 — not AIStor enterprise
  minio:
    image: ${ATLANTISBOARD_MINIO_IMAGE:?Set ATLANTISBOARD_MINIO_IMAGE — see install/docker/image-defaults.env}
    container_name: atlantisboard-minio-deps
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?Set MINIO_ACCESS_KEY in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?Set MINIO_SECRET_KEY in .env}
    command: server /data --console-address "127.0.0.1:9001"
    volumes:
      - minio-data:/data
    ports:
      - '127.0.0.1:9000:9000'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3

  # AGPL community mc CLI — not AIStor enterprise
  minio-setup:
    image: ${ATLANTISBOARD_MINIO_MC_IMAGE:?Set ATLANTISBOARD_MINIO_MC_IMAGE — see install/docker/image-defaults.env}
    container_name: atlantisboard-minio-setup-deps
    depends_on:
      minio:
        condition: service_healthy
    restart: 'no'
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    volumes:
      - ./minio/prod-setup.sh:/setup.sh:ro
      - ./minio/app-readwrite-policy.json:/policy/app-readwrite-policy.json:ro
    entrypoint: ['/bin/sh', '/setup.sh']

  clamav:
    image: clamav/clamav:1.4
    container_name: atlantisboard-clamav-deps
    restart: unless-stopped
    volumes:
      - clamav-db:/var/lib/clamav
    ports:
      - '127.0.0.1:3310:3310'
    healthcheck:
      test: ['CMD', '/usr/local/bin/clamdcheck.sh']
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 300s

volumes:
  mongo-data:
  mongo-config:
  redis-data:
  minio-data:
  clamav-db:
