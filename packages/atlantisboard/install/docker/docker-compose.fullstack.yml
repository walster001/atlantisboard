# Production full-stack Compose for atlantisboard-setup (app + MongoDB + Redis + MinIO).
# Paths are relative to this file (install/docker/): repo root is ../..
#
# MongoDB image: see image-defaults.env (ATLANTISBOARD_MONGO_IMAGE). Kernel 6.19+ needs mongo
# 8.0.4 or older 8.0.x — newer 8.0 tags exit on startup (SERVER-121912 / TCMalloc+RSEQ).
#
# Malware scanning: clamd when MemAvailable ≥ 2GB, else on-demand clamscan (see entrypoint.sh).
# Signatures live in clamav-sigs-full; first upload or pre-warm may run freshclam.
#
# Backups: app writes to BACKUP_LOCATION (default /data/backups in-container). Host files live under
# ATLANTISBOARD_BACKUP_HOST_DIR (default ../../backups relative to this file → install root/backups).
# The install .env is bind-mounted to /app/.env so the admin panel can persist BACKUP_LOCATION.
#
# VOLUME RESET (reinstall / new secrets):
#   cd install/docker && docker compose --env-file image-defaults.env --env-file ../../.env -f docker-compose.fullstack.yml down -v
# Or run: install/docker/reset-docker-data.sh fullstack

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "3"

services:
  mongodb:
    image: ${ATLANTISBOARD_MONGO_IMAGE:?Set ATLANTISBOARD_MONGO_IMAGE — see install/docker/image-defaults.env}
    container_name: atlantisboard-mongodb-full
    logging: *default-logging
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${MONGODB_DB_NAME:-kanboard}
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_ROOT_USER:?Set MONGODB_ROOT_USER in .env}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_ROOT_PASSWORD:?Set MONGODB_ROOT_PASSWORD in .env}
      MONGODB_APP_USER: ${MONGODB_APP_USER:-kanboard_app}
      MONGODB_APP_PASSWORD: ${MONGODB_APP_PASSWORD:?Set MONGODB_APP_PASSWORD in .env}
    entrypoint: ['/mongodb/docker-entrypoint-with-keyfile.sh']
    command:
      - mongod
      - --replSet
      - rs0
      - --bind_ip_all
      - --keyFile
      - /data/replica.key
    volumes:
      - mongo-data-full:/data/db
      - mongo-config-full:/data/configdb
      - ./mongodb/init-app-user.js:/docker-entrypoint-initdb.d/init-app-user.js:ro
      - ./mongodb/docker-entrypoint-with-keyfile.sh:/mongodb/docker-entrypoint-with-keyfile.sh:ro
    networks:
      - atlantisboard-full
    healthcheck:
      test: >
        sh -c "mongosh --host 127.0.0.1 --port 27017
        -u \"$${MONGO_INITDB_ROOT_USERNAME}\" -p \"$${MONGO_INITDB_ROOT_PASSWORD}\"
        --authenticationDatabase admin --quiet
        --eval 'db.adminCommand({ ping: 1 }).ok'"
      interval: 10s
      timeout: 10s
      retries: 8
      start_period: 60s

  mongodb-init:
    image: ${ATLANTISBOARD_MONGO_IMAGE:?Set ATLANTISBOARD_MONGO_IMAGE — see install/docker/image-defaults.env}
    container_name: atlantisboard-mongodb-init-full
    depends_on:
      mongodb:
        condition: service_healthy
    restart: 'no'
    environment:
      MONGODB_ROOT_USER: ${MONGODB_ROOT_USER}
      MONGODB_ROOT_PASSWORD: ${MONGODB_ROOT_PASSWORD}
      MONGODB_HOST: mongodb
      MONGODB_REPLICA_MEMBER_HOST: mongodb:27017
    volumes:
      - ./mongodb/replica-init-auth.sh:/replica-init.sh:ro
    entrypoint: ['bash', '/replica-init.sh']
    networks:
      - atlantisboard-full

  redis:
    image: redis:7-alpine
    container_name: atlantisboard-redis-full
    logging: *default-logging
    restart: unless-stopped
    command: >
      sh -c "
      if [ -n \"$${REDIS_PASSWORD}\" ]; then
        redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\"
      else
        echo 'REDIS_PASSWORD is required' >&2;
        exit 1;
      fi
      "
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    volumes:
      - redis-data-full:/data
    networks:
      - atlantisboard-full
    healthcheck:
      test: >
        sh -c "redis-cli -a \"$${REDIS_PASSWORD}\" ping"
      interval: 10s
      timeout: 5s
      retries: 5

  # AGPL community S3 — not AIStor enterprise
  minio:
    image: ${ATLANTISBOARD_MINIO_IMAGE:?Set ATLANTISBOARD_MINIO_IMAGE — see install/docker/image-defaults.env}
    container_name: atlantisboard-minio-full
    logging: *default-logging
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_ACCESS_KEY:-${MINIO_ACCESS_KEY:?Set MINIO_ACCESS_KEY in .env}}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_SECRET_KEY:-${MINIO_SECRET_KEY:?Set MINIO_SECRET_KEY in .env}}
    command: server /data --console-address "127.0.0.1:9001"
    volumes:
      - minio-data-full:/data
    ports:
      - '127.0.0.1:9000:9000'
    networks:
      - atlantisboard-full
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3

  # AGPL community mc CLI — not AIStor enterprise
  minio-setup:
    image: ${ATLANTISBOARD_MINIO_MC_IMAGE:?Set ATLANTISBOARD_MINIO_MC_IMAGE — see install/docker/image-defaults.env}
    container_name: atlantisboard-minio-setup-full
    depends_on:
      minio:
        condition: service_healthy
    restart: 'no'
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_ROOT_ACCESS_KEY: ${MINIO_ROOT_ACCESS_KEY:-}
      MINIO_ROOT_SECRET_KEY: ${MINIO_ROOT_SECRET_KEY:-}
    volumes:
      - ./minio/prod-setup.sh:/setup.sh:ro
      - ./minio/app-readwrite-policy.json:/policy/app-readwrite-policy.json:ro
    entrypoint: ['/bin/sh', '/setup.sh']
    networks:
      - atlantisboard-full

  app:
    build:
      context: ../..
      dockerfile: install/docker/Dockerfile
      target: production
      args:
        MC_RELEASE: ${ATLANTISBOARD_MC_RELEASE:-RELEASE.2025-08-13T08-35-41Z}
    container_name: atlantisboard-app-full
    logging: *default-logging
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - ../../.env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      MONGODB_URI: ${MONGODB_URI:?Set MONGODB_URI in .env}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
      MINIO_ENDPOINT: minio
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      ENABLE_CRON_JOBS_IN_MAIN: ${ENABLE_CRON_JOBS_IN_MAIN:-true}
      POMPELMI_SKIP_SCAN: ${POMPELMI_SKIP_SCAN:-false}
      CLAMAV_DB_DIR: /var/lib/clamav
      POMPELMI_FAIL_OPEN: ${POMPELMI_FAIL_OPEN:-false}
      BACKUP_LOCATION: ${BACKUP_LOCATION:-/data/backups}
      BACKUP_MC_PATH: ${BACKUP_MC_PATH:-/usr/local/bin/mc}
      BACKUP_MC_MIRROR_ALIAS: ${BACKUP_MC_MIRROR_ALIAS:-local}
      BACKUP_MC_ENDPOINT: ${BACKUP_MC_ENDPOINT:-http://minio:9000}
      ATL_ENV_FILE: /app/.env
      ATL_DOCKER_FULLSTACK: "true"
    volumes:
      - clamav-sigs-full:/var/lib/clamav
      - type: bind
        source: ${ATLANTISBOARD_BACKUP_HOST_DIR:-../../backups}
        target: /data/backups
        bind:
          create_host_path: true
      - type: bind
        source: ../../.env
        target: /app/.env
    depends_on:
      mongodb:
        condition: service_healthy
      mongodb-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    networks:
      - atlantisboard-full
    healthcheck:
      test: ['CMD', 'bun', 'run', '-e', "fetch('http://localhost:3000/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  mongo-data-full:
  mongo-config-full:
  redis-data-full:
  minio-data-full:
  clamav-sigs-full:

networks:
  atlantisboard-full:
    driver: bridge
