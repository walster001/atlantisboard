<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Fully-functional, self-hosted Kanban board application" />
    <title>Kanboard</title>
    <!-- Blank default until `AppBrandingProvider` applies Admin → Login → Browser tab & favicon. Must match `FAVICON_LINK_ID` + `BLANK_TAB_FAVICON_HREF` in client. -->
    <link
      id="kanboard-app-branding-favicon"
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'/%3E"
    />
    <link rel="stylesheet" href="/index.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.js"></script>
    <script>
      // Add manifest link
      const link = document.createElement('link');
      link.rel = 'manifest';
      link.href = '/manifest.json';
      document.head.appendChild(link);
    </script>
  </body>
</html>
