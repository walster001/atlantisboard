<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- `maximum-scale=1` prevents iOS PWA focus/scroll zoom from breaking fullscreen modals -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="description" content="Fully-functional, self-hosted Kanban board application" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Kanboard" />
    <meta name="theme-color" content="#1a5b99" />
    <title>Kanboard</title>
    <!-- Blank default until `AppBrandingProvider` applies Admin → Login → Browser tab & favicon. Must match `FAVICON_LINK_ID` + `BLANK_TAB_FAVICON_HREF` in client. -->
    <link
      id="kanboard-app-branding-favicon"
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'/%3E"
    />
    <link rel="stylesheet" href="/index.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.js"></script>
    <link rel="manifest" href="/manifest.json" />
  </body>
</html>
