<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- `maximum-scale=1` prevents iOS PWA focus/scroll zoom from breaking fullscreen modals -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="description" content="Fully-functional, self-hosted Kanban board application" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Atlantisboard" />
    <meta name="theme-color" content="#1a5b99" />
    <meta name="msapplication-TileColor" content="#1a5b99" />
    <meta name="msapplication-config" content="/icons/browserconfig.xml" />
    <title>Atlantisboard</title>
    <!-- Primary tab icon: `id` must match `FAVICON_LINK_ID` in `AppBrandingContext.tsx`; `href` matches `DEFAULT_TAB_FAVICON_HREF` in `loginBranding.ts` until admin overrides. -->
    <link
      id="atlantisboard-app-branding-favicon"
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/icons/favicon-32x32.png"
    />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="194x194" href="/icons/favicon-194x194.png" />
    <link rel="shortcut icon" href="/icons/favicon.ico" />
    <!-- Apple touch icon (180×180 PNG under `public/icons/`; iOS home screen / Add to Home Screen) -->
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <!-- PWA / Chrome: explicit `sizes` hints (manifest remains canonical for install) -->
    <link rel="icon" type="image/png" sizes="36x36" href="/icons/android-chrome-36x36.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/icons/android-chrome-48x48.png" />
    <link rel="icon" type="image/png" sizes="72x72" href="/icons/android-chrome-72x72.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/icons/android-chrome-96x96.png" />
    <link rel="icon" type="image/png" sizes="144x144" href="/icons/android-chrome-144x144.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/android-chrome-192x192.png" />
    <link rel="icon" type="image/png" sizes="256x256" href="/icons/android-chrome-256x256.png" />
    <link rel="icon" type="image/png" sizes="384x384" href="/icons/android-chrome-384x384.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/android-chrome-512x512.png" />
    <link rel="mask-icon" href="/icons/safari-pinned-tab.svg" color="#1a5b99" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="/index.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.js"></script>
  </body>
</html>
