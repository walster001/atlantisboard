# Limits systemd journal disk use inside the WSL distro (not controlled by .wslconfig).
# Apply once per distro:
#   sudo mkdir -p /etc/systemd/journald.conf.d
#   sudo cp /path/to/this/repo/wsl/journald/99-wsl-limits.conf /etc/systemd/journald.conf.d/
#   sudo systemctl restart systemd-journald
#
[Journal]
SystemMaxUse=64M
RuntimeMaxUse=32M
MaxRetentionSec=2week
